<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FREQUENCY - XFORG3</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <a href="/" class="back-btn">← Back</a>
        <h1>📡 FREQUENCY</h1>
        <p class="subtitle">Select a tool to launch</p>
      </div>

      <div class="tool-grid">
        <!-- Bettercap -->
        <div class="tool-card" onclick="openTool('bettercap')">
          <div class="tool-icon">🛡️</div>
          <h3>BETTERCAP</h3>
          <p>Network monitoring & MITM attacks</p>
          <button class="launch-btn">Launch →</button>
        </div>

        <!-- DEAUTH (WiFi Deauth) -->
        <div class="tool-card" onclick="openTool('deauth')">
          <div class="tool-icon">📶</div>
          <h3>DEAUTH</h3>
          <p>WiFi deauthentication attack</p>
          <button class="launch-btn">Launch →</button>
        </div>

        <!-- MDK4 -->
        <div class="tool-card" onclick="openTool('mdk4')">
          <div class="tool-icon">💥</div>
          <h3>MDK4</h3>
          <p>WiFi flooding & deauthentication attacks</p>
          <button class="launch-btn">Launch →</button>
        </div>
      </div>
    </div>

    <script>
      function openTool(toolName) {
        window.location.href = `/tool/${toolName}`;
      }
    </script>
  </body>
</html>
