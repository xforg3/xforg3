# hostapd.conf - Konfigurasi Access Point
# File ini akan di-generate otomatis oleh run.sh, 
# tapi kalau mau manual, isinya:

interface=wlan0mon
driver=nl80211
ssid=Free WiFi
hw_mode=g
channel=6
wmm_enabled=1
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0

# Kalau mau pake password (WPA2), uncomment ini:
# wpa=2
# wpa_passphrase=password123
# wpa_key_mgmt=WPA-PSK
# rsn_pairwise=CCMP